<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="admin.css">

</head>

<body>




    <header>

        <div class="nav-bar">




            <div class="web-name">

                <a href="#" class="web-name">

                    <img src="Admin.jpg" alt="Logo" id="nav-logo">

                    <h3>
                        Admin Dashboard
                    </h3>

                </a>

            </div>






            <div class="button-section">

                <div>

                    <a href="" id="a-color">

                        Welcome, Admin

                    </a>

                </div>



                <button class="logout-btn" id="btn-logut">

                    <img src="logout.png" class="icon">

                    Logout

                </button>

            </div>

        </div>

    </header>







    <main>

        <div class="main">





            <div class="side-bar">





                <div class="element active" onclick="statisticPage(this)" data-index="0">

                    <i class="fa-solid fa-chart-column" id="feature-box-icon"></i>

                    Statistics

                </div>







                <div class="element" onclick="approvalPage(this)" data-index="1">

                    <i class="fa-solid fa-user-check" id="feature-box-icon"></i>

                    Approvals

                </div>





                <div class="element" onclick="campaignsPage(this)" data-index="2">

                    <i class="fa-solid fa-bullhorn" id="feature-box-icon"></i>

                    Campaigns

                </div>

            </div>







            <iframe id="frame" src="statistics.html">

            </iframe>

        </div>

    </main>






    <script src="admin.js"></script>

</body>

</html>
