<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="Statistics.css">
</head>

<body>

    <main>
        <div class="item1">
            <div class="report">
                <i class="fa-solid fa-download"></i>Generate Monthly Report (PDF)
            </div>
        </div>
        <div class="item2">
            <div class="graph1">
                Monthly Collection Volume
                <div class="chart">


                    <div class="numbers">
                        <span>800</span>
                        <span>600</span>
                        <span>400</span>
                        <span>200</span>
                        <span>0</span>
                    </div>


                    <div class="graph">

                        <div class="bar" style="height: 200px;">
                            <p>Jan</p>
                        </div>

                        <div class="bar" style="height: 150px;">
                            <p>Feb</p>
                        </div>

                        <div class="bar" style="height: 100px;">
                            <p>Mar</p>
                        </div>

                        <div class="bar" style="height: 180px;">
                            <p>Apr</p>
                        </div>

                    </div>

                </div>
                <div class="u-level">
                    <div class="under-level">
                        <div class="u-l-b">
                            <div class="llll"></div>
                            <div class="rrrr"></div>
                        </div>Weight (kg)
                    </div>
                </div>
            </div>
            <div class="graph2-box">

                <div class="graph2-level">Category Breakdown</div>
                <div class="graph2">


                    <div class="pie"></div>
                    <div class="labels">

                        <div class="label">
                            <span class="color green"></span>
                            Battery: 30%
                        </div>

                        <div class="label">
                            <span class="color blue"></span>
                            Laptop: 20%
                        </div>

                        <div class="label">
                            <span class="color yellow"></span>
                            Appliance: 15%
                        </div>

                        <div class="label">
                            <span class="color red"></span>
                            Mobille: 25%
                        </div>

                        <div class="label">
                            <span class="color purple"></span>
                            Other: 10%
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="Statistics.js"></script>
</body>

</html>
