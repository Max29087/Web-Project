<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css
    ">
</head>

<body>


    <!-- header  -->
    <header>
        <div class="nav-bar">



            <!-- name  -->
            <div class="web-name">
                <a href="#" class="web-name">
                    <img src="logo.png" alt="Logo" id="nav-logo">
                    <h3>E-Waste Manager</h3>
                </a>
            </div>



            <!-- Button  -->
            <div class="button-section">
                <div>
                    <a href="../index.html" id="a-color">
                        Home
                    </a>
                </div>
                <div>
                    <a href="../Awareness/awareness.html" id="a-color">
                        Awareness
                    </a>
                </div>
                <div>
                    <a href="" id="a-color">
                        Categories
                    </a>
                </div>
                <div>
                    <a href="" id="a-color">
                        Contact
                    </a>
                </div>
                <div>
                    <a href="login.html" id="a-color">
                        Login
                    </a>
                </div>
            </div>



        </div>
    </header>



    <!-- Main -->
    <main>

        <div class="login-box">

            <div class="login-signup-level">
                <div class="login login-l" id="login1-btn">Login</div>
                <div class="signup login-l" id="signup1-btn">Signup</div>

            </div>

        </div>


        <div class="form-box">
            <div class="form-box-item">
                <div class="level">
                    Create an Account
                </div>
                <div class="level2">
                    Sign up to start recycling e-waste
                </div>



                <div class="input-level">
                    Full Name
                </div>
                <div class="input">
                    <input type="text" placeholder="John Doe" id="name">
                </div>



                <div class="input-level">
                    Email
                </div>
                <div class="input">
                    <input type="email" placeholder="your@gmail.com" id="email">
                </div>



                <div class="input-level">
                    Phone
                </div>
                <div class="input">
                    <input type="tel" pattern="[0-9]{11}" placeholder="01XXXXXXXXX" id="phone">
                </div>


                <div class="input-level">
                    Password
                </div>
                <div class="input">
                    <input type="password" placeholder="password" id="pass">
                </div>


                <div class="input-level">
                    Account Type
                </div>
                <div class="inpu1">
                    <select id="select-option">
                        <option value="" selected disabled>Select your type</option>
                        <option value="user">User</option>
                        <option value="collector">Collector</option>
                        <option value="recycling">Recycling Center</option>
                    </select>
                </div>



                <div class="form-button" id="create-btn">
                    Create Account
                </div>


                <div class="level3">
                    Your account will be activated after admin approval
                </div>
            </div>
        </div>






    </main>






    <script src="Signup.js"></script>
</body>

</html>
